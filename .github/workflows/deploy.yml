name: Deploy · Mikma Lençóis
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_FIREBASE_VAPID_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_VAPID_KEY }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
      FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
      RECAPTCHA_SECRET_KEY: ${{ secrets.RECAPTCHA_SECRET_KEY }}
      ABACATEPAY_API_KEY: ${{ secrets.ABACATEPAY_API_KEY }}
      ABACATEPAY_PUBLIC_KEY: ${{ secrets.ABACATEPAY_PUBLIC_KEY }}
      MELHOR_ENVIO_TOKEN: ${{ secrets.MELHOR_ENVIO_TOKEN }}
      MELHOR_ENVIO_CLIENT_SECRET: ${{ secrets.MELHOR_ENVIO_CLIENT_SECRET }}
      MELHOR_ENVIO_SANDBOX: 'false'
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_WEBHOOK_SECRET: ${{ secrets.RESEND_WEBHOOK_SECRET }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      EMAIL_CONTATO_ADDRESS: ${{ secrets.EMAIL_CONTATO_ADDRESS }}
      NEXT_PUBLIC_APP_URL: https://mikma.com.br
      NEXT_PUBLIC_BASE_URL: https://mikma.com.br
      GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Rodar testes automatizados
        run: npm test

      - name: "[TEMP] Diagnóstico Sentry (não expõe valores)"
        run: |
          check() {
            local name="$1" val="$2"
            local len=${#val}
            if [ -z "$val" ]; then
              echo "$name: VAZIO"
            else
              echo "$name: preenchido (len=$len, prefixo=${val:0:12}...)"
            fi
          }
          check "SENTRY_DSN" "$SENTRY_DSN"
          check "NEXT_PUBLIC_SENTRY_DSN" "$NEXT_PUBLIC_SENTRY_DSN"
          check "SENTRY_ORG" "$SENTRY_ORG"
          check "SENTRY_PROJECT" "$SENTRY_PROJECT"
          check "SENTRY_AUTH_TOKEN" "$SENTRY_AUTH_TOKEN"

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-v2-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.css', 'src/**/*.ts', 'src/**/*.tsx', 'tailwind.config.ts') }}
          # Sem restore-keys de propósito: um fallback por prefixo pode
          # restaurar um cache de webpack de um commit anterior quando o
          # hash exato não bate, e isso já causou pelo menos um chunk
          # compartilhado ficar desatualizado (código antigo servido em
          # produção mesmo após o fix estar no commit). Preferimos um
          # cache miss ocasional (build mais lenta) a servir código stale.

      - name: Criar .env.production com variáveis server-side
        run: |
          cat > .env.production << EOF
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          RESEND_WEBHOOK_SECRET=${{ secrets.RESEND_WEBHOOK_SECRET }}
          RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}
          EMAIL_CONTATO_ADDRESS=${{ secrets.EMAIL_CONTATO_ADDRESS }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}
          RECAPTCHA_SECRET_KEY=${{ secrets.RECAPTCHA_SECRET_KEY }}
          ABACATEPAY_API_KEY=${{ secrets.ABACATEPAY_API_KEY }}
          ABACATEPAY_PUBLIC_KEY=${{ secrets.ABACATEPAY_PUBLIC_KEY }}
          MELHOR_ENVIO_TOKEN=${{ secrets.MELHOR_ENVIO_TOKEN }}
          CRON_SECRET=${{ secrets.CRON_SECRET }}
          UBER_DIRECT_CLIENT_ID=${{ secrets.UBER_DIRECT_CLIENT_ID }}
          UBER_DIRECT_CLIENT_SECRET=${{ secrets.UBER_DIRECT_CLIENT_SECRET }}
          UBER_DIRECT_CUSTOMER_ID=${{ secrets.UBER_DIRECT_CUSTOMER_ID }}
          UBER_DIRECT_WEBHOOK_SECRET=${{ secrets.UBER_DIRECT_WEBHOOK_SECRET }}
          UBER_DIRECT_SANDBOX_CLIENT_ID=${{ secrets.UBER_DIRECT_SANDBOX_CLIENT_ID }}
          UBER_DIRECT_SANDBOX_CLIENT_SECRET=${{ secrets.UBER_DIRECT_SANDBOX_CLIENT_SECRET }}
          UBER_DIRECT_SANDBOX_CUSTOMER_ID=${{ secrets.UBER_DIRECT_SANDBOX_CUSTOMER_ID }}
          UBER_DIRECT_SANDBOX_WEBHOOK_SECRET=${{ secrets.UBER_DIRECT_SANDBOX_WEBHOOK_SECRET }}
          UBER_DIRECT_RADIUS_KM=15
          ORS_API_KEY=${{ secrets.ORS_API_KEY }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_ORG=${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          EOF

      - name: Build Next.js
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account key
        run: echo "$GOOGLE_APPLICATION_CREDENTIALS" > $HOME/sa.json

      - name: Check if functions changed
        id: functions-changed
        run: |
          git diff --name-only HEAD~1 HEAD | grep -q '^functions/' && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Deploy Firestore Rules
        run: GOOGLE_APPLICATION_CREDENTIALS=$HOME/sa.json firebase deploy --only firestore:rules --project mikma-lencois

      - name: Deploy Firestore Indexes
        # A service account do CI ainda não tem a permissão de IAM pra gerenciar
        # índices (403 em collectionGroups/.../indexes). Até isso ser resolvido
        # no IAM do projeto, não deixamos essa falha travar o deploy do site —
        # é só um passo a mais de infra, não algo que quebra produção na hora.
        # Ver nota no fim do arquivo sobre como resolver a permissão.
        run: GOOGLE_APPLICATION_CREDENTIALS=$HOME/sa.json firebase deploy --only firestore:indexes --project mikma-lencois
        continue-on-error: true

      - name: Deploy Storage Rules
        # continue-on-error mantido como rede de segurança: se faltar
        # alguma permissão de IAM específica do Storage no futuro, isso
        # não deve travar o deploy do site (que depende só do Firestore).
        run: GOOGLE_APPLICATION_CREDENTIALS=$HOME/sa.json firebase deploy --only storage --project mikma-lencois
        continue-on-error: true

      - name: Deploy hosting + functions
        if: steps.functions-changed.outputs.changed == 'true'
        run: GOOGLE_APPLICATION_CREDENTIALS=$HOME/sa.json firebase deploy --only hosting --force --project mikma-lencois
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

      - name: Deploy hosting only
        if: steps.functions-changed.outputs.changed == 'false'
        run: GOOGLE_APPLICATION_CREDENTIALS=$HOME/sa.json firebase deploy --only hosting --force --project mikma-lencois
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

# ── Nota: permissão de índices do Firestore ──────────────────────────────────
# O passo "Deploy Firestore Indexes" acima falha com 403 porque a service
# account usada pelo CI (a mesma de FIREBASE_CLIENT_EMAIL/GOOGLE_APPLICATION_
# CREDENTIALS) não tem a role de IAM pra criar/editar índices compostos.
# Pra corrigir de vez (e então poder tirar o continue-on-error acima):
#   1. console.cloud.google.com/iam-admin/iam?project=mikma-lencois
#   2. Encontre a service account (o e-mail que está em FIREBASE_CLIENT_EMAIL)
#   3. Edite as permissões e adicione a role "Cloud Datastore Index Admin"
#      (roles/datastore.indexAdmin) -- ou, mais simples, "Firebase Admin"
#      (roles/firebase.admin), que já cobre isso e outras operações do CI.
#   4. Rode o workflow de novo (Actions -> Deploy -> Run workflow).
