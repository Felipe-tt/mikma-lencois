name: Keep Site Warm

# Faz um ping leve no site a cada poucos minutos pra evitar que a
# instância do Cloud Run/Functions (minInstances: 0) durma e cause
# cold start de vários segundos na próxima visita de um cliente real.
#
# Isso NÃO substitui "minInstances: 1" — se o GitHub atrasar o cron
# (comum em horários de pico, o agendamento do GitHub Actions não é
# garantido no minuto exato) ou se ninguém bater no site por mais
# tempo que o TTL de idle do Cloud Run, ainda pode acontecer cold
# start. É uma mitigação de custo zero, não uma garantia.

on:
  schedule:
    - cron: '*/10 * * * *' # a cada 10 minutos
  workflow_dispatch: {} # permite rodar manualmente pelo GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping mikma.com.br
        run: |
          curl -s -o /dev/null -w "status=%{http_code} time=%{time_total}s\n" \
            --max-time 30 \
            "https://mikma.com.br/" || true
