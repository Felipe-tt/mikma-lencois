# Configuração de ambiente do Firebase App Hosting
# https://firebase.google.com/docs/app-hosting/configure
#
# Atenção: valores definidos no Firebase Console (Hosting & Serverless > App Hosting
# > View Backend > Settings > Environment) têm PRECEDÊNCIA sobre os valores deste
# arquivo. Se NEXT_PUBLIC_BASE_URL já existir lá com outro valor, ele prevalece
# sobre o que está aqui. Confira e remova/corrija lá se for o caso.

env:
  - variable: NEXT_PUBLIC_BASE_URL
    value: https://mikma.com.br
    availability:
      - BUILD
      - RUNTIME
